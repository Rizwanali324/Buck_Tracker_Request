name: Keep HF Space Alive (Pro + Secure)

on:
  schedule:
    - cron: "*/1 * * * *"   # every 5 minutes
    # - cron: "0 9 * * *"   # 5 AM Canada (DST)
    # - cron: "0 10 * * *"  # 5 AM Canada (non-DST)

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping HF Space (using secret)
        env:
          URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=10

          echo "🚀 Starting ping to HF Space..."
          echo "🔗 URL: $URL"

          for i in $(seq 1 $MAX_RETRIES); do
            echo "🔁 Attempt $i..."

            response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" $URL)

            body=$(echo "$response" | sed -e 's/HTTP_STATUS:.*//g')
            status=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

            echo "📦 Response Body:"
            echo "$body"
            echo "📡 HTTP Status: $status"

            if [ "$status" -eq 200 ]; then
              echo "✅ Success! Space is awake."
              exit 0
            fi

            echo "⚠️ Failed attempt $i. Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          done

          echo "❌ All retries failed."
          exit 1
