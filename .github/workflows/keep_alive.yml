- name: Ping HF Space (direct URL)
  run: |
    URL="https://codewithriz-buck-tracker.hf.space/auth/status"

    MAX_RETRIES=5
    RETRY_DELAY=10

    echo "🚀 Starting ping to HF Space..."
    echo "🔗 URL: $URL"

    for i in $(seq 1 $MAX_RETRIES); do
      echo "🔁 Attempt $i..."

      response=$(curl -s -L -w "\nHTTP_STATUS:%{http_code}" \
        -X GET "$URL" \
        -H "accept: application/json")

      body=$(echo "$response" | sed -e 's/HTTP_STATUS:.*//g')
      status=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

      echo "📦 Response Body:"
      echo "$body"
      echo "📡 HTTP Status: $status"

      if [ "$status" -eq 200 ]; then
        echo "✅ Success! Space is awake."
        exit 0
      fi

      echo "⚠️ Failed attempt $i. Retrying in $RETRY_DELAY seconds..."
      sleep $RETRY_DELAY
    done

    echo "❌ All retries failed."
    exit 1
